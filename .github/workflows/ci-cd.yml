name: CI/CD Pipeline - SO2 Proyecto

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Login a Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build imagen Docker
      run: docker build -t pablomaldd/so2-app:latest ./app

    - name: Prueba basica
      run: |
        docker run -d -p 8080:5000 --name test-container pablomaldd/so2-app:latest
        sleep 5
        docker ps | grep test-container
        docker stop test-container

    - name: Push imagen a Docker Hub
      run: docker push pablomaldd/so2-app:latest
